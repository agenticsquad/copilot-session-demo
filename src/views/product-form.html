<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipo Atlas | Producto</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
    main { max-width: 720px; margin: 40px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 6px 20px rgba(15, 23, 42, 0.08); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    label { display: flex; flex-direction: column; gap: 6px; font-weight: 600; }
    input, select, button, a { font: inherit; }
    input, select { padding: 10px 12px; border-radius: 8px; border: 1px solid #d1d5db; }
    .actions { margin-top: 24px; display: flex; gap: 12px; }
    button, .secondary { padding: 10px 14px; border-radius: 8px; border: none; cursor: pointer; text-decoration: none; }
    button { background: #2563eb; color: white; }
    .secondary { background: #e5e7eb; color: #111827; }
    .helper { color: #6b7280; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1 id="pageTitle">Nuevo producto</h1>
      <p class="helper">Formulario básico sin validaciones avanzadas. Ideal para las tareas pendientes del backlog.</p>
      <form id="productForm">
        <div class="grid">
          <label>
            Nombre
            <input type="text" name="name">
          </label>
          <label>
            Categoría
            <select name="category">
              <option value="Electronics">Electronics</option>
              <option value="Office Supplies">Office Supplies</option>
              <option value="Furniture">Furniture</option>
            </select>
          </label>
          <label>
            SKU
            <input type="text" name="sku">
          </label>
          <label>
            Cantidad
            <input type="number" name="quantity">
          </label>
          <label>
            Stock mínimo
            <input type="number" name="minStock">
          </label>
          <label>
            Precio
            <input type="number" step="0.01" name="price">
          </label>
        </div>
        <div class="actions">
          <button type="submit">Guardar</button>
          <a href="/" class="secondary">Cancelar</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('productForm');
    const pageTitle = document.getElementById('pageTitle');
    const productId = new URLSearchParams(window.location.search).get('id');

    async function loadProduct() {
      if (!productId) {
        return;
      }

      pageTitle.textContent = 'Editar producto';
      const response = await fetch(`/api/products/${productId}`);
      const result = await response.json();
      const product = result.data;

      if (!product) {
        window.location.href = '/';
        return;
      }

      form.elements.name.value = product.name || '';
      form.elements.category.value = product.category || 'Electronics';
      form.elements.sku.value = product.sku || '';
      form.elements.quantity.value = product.quantity ?? 0;
      form.elements.minStock.value = product.minStock ?? 0;
      form.elements.price.value = product.price ?? 0;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const payload = {
        name: form.elements.name.value,
        category: form.elements.category.value,
        sku: form.elements.sku.value,
        quantity: form.elements.quantity.value,
        minStock: form.elements.minStock.value,
        price: form.elements.price.value
      };

      const method = productId ? 'PUT' : 'POST';
      const endpoint = productId ? `/api/products/${productId}` : '/api/products';

      await fetch(endpoint, {
        method,
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      window.location.href = '/';
    });

    loadProduct();
  </script>
</body>
</html>
